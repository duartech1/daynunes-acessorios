<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Day Nunes Acessórios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #fff0f6, #ffe4ec);
}

/* HEADER */
header {
  background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946') no-repeat center;
  background-size: cover;
  color: #fff;
  padding: 60px 20px;
  text-align: center;
  position: relative;
}

header::before {
  content: "";
  position: absolute;
  width: 100%; height: 100%;
  background: rgba(255,57,140,0.5);
  top:0; left:0;
}

header h1, header p { position: relative; }

/* NAV */
nav {
  background:#1f1f1f;
  padding:12px;
  text-align:center;
}

nav a {
  color:#fff;
  margin:0 15px;
  text-decoration:none;
}

nav a:hover { color:#ff85b3; }

/* GRID */
.produtos {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.produto {
  background: rgba(255,255,255,0.8);
  padding:15px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.produto img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

/* BOTÕES */
.botao {
  background:linear-gradient(90deg,#ff398c,#ff85b3);
  border:none;
  padding:10px;
  margin-top:8px;
  border-radius:20px;
  color:white;
  cursor:pointer;
  display:block;
}

/* CARRINHO */
.carrinho {
  position:fixed;
  top:20px;
  right:20px;
  background:white;
  padding:15px;
  border-radius:15px;
  width:250px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.carrinho h3 {
  margin-top:0;
}

.finalizar {
  background:#25D366;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

/* RESPONSIVO */
@media(max-width:1024px){
  .produtos { grid-template-columns:repeat(2,1fr); }
}

@media(max-width:600px){
  .produtos { grid-template-columns:1fr; }
  .carrinho { width:90%; right:5%; }
}
</style>
</head>

<body>

<header>
<h1>Day Nunes Acessórios</h1>
<p>Estilo e elegância para você</p>
</header>

<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
</nav>

<!-- CARRINHO -->
<div class="carrinho">
<h3>🛒 Carrinho</h3>
<ul id="listaCarrinho"></ul>
<button class="finalizar" onclick="enviarWhats()">Finalizar Pedido</button>
</div>

<!-- PRODUTOS -->
<div class="produtos">

<div class="produto">
<img src="Fotos/colar-gota.jpg">
<h3>Colar Gota</h3>
<p>R$ 79,99</p>
<button class="botao" onclick="addCarrinho('Colar Gota',79.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Fotos/Brincos.jpg">
<h3>Brincos</h3>
<p>R$ 59,99</p>
<button class="botao" onclick="addCarrinho('Brincos',59.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Fotos/colar aro.jpg">
<h3>Colar Aro</h3>
<p>R$ 109,99</p>
<button class="botao" onclick="addCarrinho('Colar Aro',109.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Fotos/colar espiral.jpg">
<h3>Colar Espiral</h3>
<p>R$ 79,99</p>
<button class="botao" onclick="addCarrinho('Colar Espiral',79.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Fotos/Brinco coracao.jpg">
<h3>Brinco Coração</h3>
<p>R$ 49,99</p>
<button class="botao" onclick="addCarrinho('Brinco Coração',49.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Fotos/brinco estrela.jpg">
<h3>Brinco Estrela</h3>
<p>R$ 49,99</p>
<button class="botao" onclick="addCarrinho('Brinco Estrela',49.99)">Adicionar</button>
</div>

</div>

<script>
let carrinho = [];

function addCarrinho(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
}

function atualizarCarrinho(){
  let lista = document.getElementById("listaCarrinho");
  lista.innerHTML = "";

  carrinho.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.nome + " - R$ " + item.preco;
    lista.appendChild(li);
  });
}

function enviarWhats(){
  let mensagem = "Olá, gostaria de comprar:%0A";

  carrinho.forEach(item=>{
    mensagem += "- " + item.nome + " (R$ " + item.preco + ")%0A";
  });

  window.open("https://wa.me/5571991178867?text=" + mensagem);
}
</script>

</body>
</html>
